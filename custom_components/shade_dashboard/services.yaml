recalibrate:
  name: Recalibrate shade
  description: >-
    Re-teach a PowerView shade's travel limits when its reported position has
    drifted from reality (the shade drives to both hard stops). Only works for
    the gateway-tracked PowerView shades, not the RYSE main-bedroom shade.
  target:
    entity:
      integration: shade_dashboard
      domain: cover

move_group:
  name: Move a group of shades in sync
  description: >-
    Move several shades to one position in a single synchronized gateway call
    (no PowerView scene). PowerView members move together via one positions
    request; the RYSE main-bedroom shade moves via its own cover.
  fields:
    entity_id:
      name: Shades
      description: The shade covers to move (cover.shade_*). Use this or group.
      required: false
      example: "[cover.shade_u4, cover.shade_l3]"
      selector:
        entity:
          integration: shade_dashboard
          domain: cover
          multiple: true
    group:
      name: Group
      description: >-
        A named group instead of listing covers — south, west, north, hallway,
        office, upstairs_hallway, main_bedroom, main_floor, upstairs, all, or the
        automation groups west_glare / south_glare / all_no_bedroom.
      required: false
      example: west_glare
      selector:
        text:
    position:
      name: Position
      description: Target position, 0 = closed, 100 = open.
      required: true
      example: 100
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    verify:
      name: Verify arrival
      description: >-
        Confirm the shades actually reached the target; re-drive any that didn't
        (one retry) and raise a notification if they still fail. Use for
        automations; the dashboard leaves this off for instant feedback.
      required: false
      default: false
      selector:
        boolean:
